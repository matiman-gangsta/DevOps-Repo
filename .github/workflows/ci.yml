name: CI Pipeline

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalación de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalación de dependencias
        run: npm install

      - name: Verificación de Microservicio
        run: |
          echo "Ejecutando validación de integración en la nube..."
          node -c app.js